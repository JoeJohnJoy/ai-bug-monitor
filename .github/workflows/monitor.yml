name: Bug Monitor

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false   # submodules not needed for analysis

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync
        working-directory: ai_lib_contrib

      - name: Run bug monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python main.py
        working-directory: ai_lib_contrib

      - name: Commit new solutions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai_lib_contrib/solutions/
          git diff --cached --quiet || git commit -m "chore: add bug analyses [skip ci]"
          git push
